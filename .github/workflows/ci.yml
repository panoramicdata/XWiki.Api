name: CI

on:
  push:
    branches: [main]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: dotnet pack XWiki.Api/XWiki.Api.csproj --no-build --configuration Release --output ./artifacts

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get NuGet Trusted Publishing token
        id: nuget-tp
        run: |
          OIDC_TOKEN=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://NuGetTrustedPublishing" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r '.value')
          API_KEY=$(curl -sLS "https://api.nuget.org/v3/trusted-publishing/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}" | jq -r '.')
          echo "::add-mask::${API_KEY}"
          echo "api-key=${API_KEY}" >> "$GITHUB_OUTPUT"

      - name: Publish to NuGet (Trusted Publishing)
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "${{ steps.nuget-tp.outputs.api-key }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
